<h2 mat-dialog-title>Rezervă Bicicleta</h2>

<mat-dialog-content>
  <form [formGroup]="reservationForm" class="reservation-form">
    
    @if (errorMessage) {
      <div class="error-banner">
        {{ errorMessage }}
      </div>
    }

    <mat-form-field appearance="fill">
      <mat-label>Alege Data</mat-label>
      <input matInput [matDatepicker]="picker" formControlName="date">
      <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
      <mat-datepicker #picker></mat-datepicker>
    </mat-form-field>

    <mat-form-field appearance="fill">
      <mat-label>Ora Start</mat-label>
      <input matInput type="time" formControlName="startTime">
    </mat-form-field>

    <mat-form-field appearance="fill">
      <mat-label>Ora Final</mat-label>
      <input matInput type="time" formControlName="endTime">
    </mat-form-field>

  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close [disabled]="isLoading">Anulează</button>
  <button mat-flat-button color="primary" 
          (click)="onSubmit()" 
          [disabled]="reservationForm.invalid || isLoading">
    Confirmă Rezervarea
  </button>
</mat-dialog-actions>
